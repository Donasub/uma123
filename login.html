<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Universe Merch Africa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,600&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="universe-merch.css" />
  <style>
    /* LOGIN PAGE SPECIFIC STYLES */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--cream);
      position: relative;
      overflow: hidden;
    }

    .login-wrapper::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -10%;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(230, 169, 52, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrapper::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -15%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 60px solid rgba(91, 26, 26, 0.05);
      pointer-events: none;
    }

    .login-container {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(23, 20, 15, 0.16);
      width: 100%;
      max-width: 440px;
      padding: 3.5rem 2.5rem;
      position: relative;
      z-index: 10;
      animation: fadeSlideUp 0.8s ease;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .login-logo-mark {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--oxblood);
      color: var(--cream);
      display: grid;
      place-items: center;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.3rem;
      border: 2px solid var(--mustard);
    }

    .login-logo-text {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--ink);
    }

    .login-logo-text em {
      font-style: italic;
      color: var(--mustard);
      font-weight: 400;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 0.5rem;
      letter-spacing: -0.015em;
    }

    .login-title em {
      font-style: italic;
      color: var(--oxblood);
      font-weight: 300;
    }

    .login-subtitle {
      font-size: 0.95rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }

    .login-toggle {
      font-size: 0.85rem;
      color: var(--text-mid);
      margin-top: 1rem;
    }

    .login-toggle a {
      color: var(--oxblood);
      font-weight: 600;
      transition: color var(--transition);
      cursor: pointer;
    }

    .login-toggle a:hover {
      color: var(--mustard);
    }

    /* FORM STYLES */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-label {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .form-input {
      padding: 1rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--ink);
      background: var(--white);
      transition: all var(--transition);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--mustard);
      box-shadow: 0 0 0 4px rgba(230, 169, 52, 0.12);
    }

    .form-input::placeholder {
      color: var(--text-light);
    }

    .form-checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.2rem;
    }

    .form-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--mustard);
    }

    .form-checkbox-label {
      font-size: 0.85rem;
      color: var(--text-mid);
      cursor: pointer;
      user-select: none;
    }

    .form-checkbox-label a {
      color: var(--oxblood);
      font-weight: 600;
      transition: color var(--transition);
    }

    .form-checkbox-label a:hover {
      color: var(--mustard);
    }

    .forgot-password {
      text-align: right;
    }

    .forgot-password a {
      font-size: 0.82rem;
      color: var(--oxblood);
      font-weight: 500;
      transition: color var(--transition);
    }

    .forgot-password a:hover {
      color: var(--mustard);
    }

    /* BUTTONS */
    .btn-login {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--mustard);
      color: var(--ink);
      padding: 1rem 2rem;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 6px;
      border: 2px solid var(--mustard);
      cursor: pointer;
      transition: all var(--transition);
      margin-top: 1rem;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(230, 169, 52, 0.35);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login.loading::after {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(23, 20, 15, 0.2);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* DIVIDER */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--text-light);
      font-size: 0.85rem;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* SOCIAL LOGIN */
    .social-login {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0.9rem 1rem;
      border: 1px solid var(--border);
      background: var(--white);
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      transition: all var(--transition);
    }

    .social-btn:hover {
      border-color: var(--mustard);
      background: rgba(230, 169, 52, 0.05);
    }

    /* ERROR & SUCCESS MESSAGES */
    .message {
      padding: 1rem 1.2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      display: none;
      animation: slideDown 0.4s ease;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: rgba(200, 52, 43, 0.1);
      color: var(--red);
      border-left: 3px solid var(--red);
    }

    .message.success {
      background: rgba(26, 87, 39, 0.1);
      color: #1a5727;
      border-left: 3px solid #1a5727;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* RESPONSE STATES */
    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(23, 20, 15, 0.2);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .btn-login.loading .loading-spinner {
      display: inline-block;
    }

    /* RESPONSIVE */
    @media (max-width: 520px) {
      .login-container {
        padding: 2.5rem 1.8rem;
      }

      .login-title {
        font-size: 1.8rem;
      }

      .login-wrapper::before {
        width: 300px;
        height: 300px;
      }

      .login-wrapper::after {
        width: 250px;
        height: 250px;
      }
    }
  </style>
</head>
<body>

  <!-- LOGIN WRAPPER -->
  <div class="login-wrapper">
    <div class="login-container">
      
      <!-- HEADER -->
      <div class="login-header">
        <div class="login-logo">
          <div class="login-logo-mark">U</div>
          <div class="login-logo-text">Universe<em>Merch</em></div>
        </div>
        <h1 class="login-title">Welcome <em>Back</em></h1>
        <p class="login-subtitle">Sign in to your account to continue shopping</p>
      </div>

      <!-- MESSAGE ALERTS -->
      <div class="message error" id="errorMessage"></div>
      <div class="message success" id="successMessage"></div>

      <!-- LOGIN FORM -->
      <form class="login-form" id="loginForm" novalidate>
        <!-- EMAIL -->
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="student@example.com"
            required
            autocomplete="email"
          />
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <!-- REMEMBER ME & FORGOT PASSWORD -->
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div class="form-checkbox-group">
            <input type="checkbox" id="rememberMe" class="form-checkbox" />
            <label for="rememberMe" class="form-checkbox-label">Remember me</label>
          </div>
          <div class="forgot-password">
            <a href="forgot-password.html">Forgot password?</a>
          </div>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="btn-login" id="submitBtn">
          <span class="loading-spinner"></span>
          Sign In
        </button>
      </form>

      <!-- DIVIDER -->
      <div class="login-divider">or continue with</div>

      <!-- SOCIAL LOGIN (Optional) -->
      <div class="social-login">
        <button type="button" class="social-btn" id="googleBtn" title="Sign in with Google">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
          </svg>
          Google
        </button>
        <button type="button" class="social-btn" id="appleBtn" title="Sign in with Apple">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6m15-3a6 6 0 0 0-9-5.197M9 19v4m3 0v4m3 0v4"/>
          </svg>
          Apple
        </button>
      </div>

      <!-- SIGNUP LINK -->
      <div class="login-toggle">
        Don't have an account? <a onclick="goToSignup()">Sign up here</a>
      </div>

    </div>
  </div>

  <!-- INCLUDE UMA CLIENT LIBRARY -->
  <script src="universe-merch-backend/public/uma-client.js"></script>
  <script>
    // Initialize UMA client
    UMA.init({ 
      apiUrl: 'http://localhost:4000/api' // Update to your backend URL
    });

    // DOM Elements
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const rememberMeCheckbox = document.getElementById('rememberMe');
    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const googleBtn = document.getElementById('googleBtn');
    const appleBtn = document.getElementById('appleBtn');

    // Helper: Show/Hide Messages
    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
      successMessage.classList.remove('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showSuccess(message) {
      successMessage.textContent = message;
      successMessage.classList.add('show');
      errorMessage.classList.remove('show');
    }

    function clearMessages() {
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');
    }

    // Helper: Set Loading State
    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      if (isLoading) {
        submitBtn.classList.add('loading');
        submitBtn.textContent = '';
      } else {
        submitBtn.classList.remove('loading');
        submitBtn.innerHTML = '<span class="loading-spinner"></span> Sign In';
      }
    }

    // FORM SUBMISSION
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Validation
      if (!email) {
        showError('Please enter your email address');
        emailInput.focus();
        return;
      }

      if (!email.includes('@')) {
        showError('Please enter a valid email address');
        emailInput.focus();
        return;
      }

      if (!password) {
        showError('Please enter your password');
        passwordInput.focus();
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      try {
        setLoading(true);

        // Call backend API
        const user = await UMA.auth.login(email, password);

        showSuccess('Login successful! Redirecting...');
        
        // Save remember me preference
        if (rememberMeCheckbox.checked) {
          localStorage.setItem('rememberEmail', email);
        } else {
          localStorage.removeItem('rememberEmail');
        }

        // Redirect to dashboard/home after 1.5 seconds
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);

      } catch (error) {
        setLoading(false);
        showError(error.message || 'Login failed. Please check your credentials.');
      }
    });

    // PREFILL EMAIL IF REMEMBERED
    window.addEventListener('DOMContentLoaded', () => {
      const savedEmail = localStorage.getItem('rememberEmail');
      if (savedEmail) {
        emailInput.value = savedEmail;
        rememberMeCheckbox.checked = true;
      }
    });

    // SOCIAL LOGIN HANDLERS
    googleBtn.addEventListener('click', () => {
      showError('Google Sign-In coming soon! Use email/password for now.');
    });

    appleBtn.addEventListener('click', () => {
      showError('Apple Sign-In coming soon! Use email/password for now.');
    });

    // NAVIGATION
    function goToSignup() {
      window.location.href = 'signup.html';
    }

    // ENTER KEY TO SUBMIT
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loginForm.dispatchEvent(new Event('submit'));
      }
    });
  </script>

</body>
</html>
