<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart — Universe Merch Africa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,600&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="universe-merch.css" />
  <style>
    /* CART PAGE STYLES */
    .cart-page {
      background: var(--cream);
      min-height: 100vh;
      padding: 2rem;
    }

    /* HEADER */
    .cart-header {
      background: var(--white);
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      border-radius: 8px;
      border-bottom: 1px solid var(--border);
    }

    .cart-header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }

    .cart-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--oxblood);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition);
    }

    .cart-back:hover {
      color: var(--mustard);
    }

    .cart-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 600;
      color: var(--ink);
      margin: 0;
      flex: 1;
      text-align: center;
    }

    .cart-placeholder {
      width: 100px;
    }

    /* MAIN GRID */
    .cart-container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 2rem;
    }

    /* CART ITEMS */
    .cart-items {
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(23, 20, 15, 0.08);
      overflow: hidden;
    }

    .cart-items-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--cream);
    }

    .cart-items-header h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--ink);
      margin: 0;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 120px 1fr 100px;
      gap: 1.5rem;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      align-items: start;
      transition: background var(--transition);
    }

    .cart-item:hover {
      background: var(--cream);
    }

    .cart-item-image {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, var(--cream) 0%, rgba(91, 26, 26, 0.05) 100%);
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 2.5rem;
      overflow: hidden;
    }

    .cart-item-details {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .cart-item-name {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
      margin: 0;
    }

    .cart-item-meta {
      font-size: 0.85rem;
      color: var(--text-mid);
    }

    .cart-item-meta span {
      display: inline-block;
      margin-right: 1.2rem;
    }

    .cart-item-price {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--mustard);
    }

    .cart-item-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: flex-end;
    }

    .quantity-adjuster {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--cream);
      padding: 0.6rem;
      border-radius: 6px;
    }

    .qty-btn-small {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      background: var(--white);
      border-radius: 4px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all var(--transition);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .qty-btn-small:hover {
      background: var(--mustard);
      border-color: var(--mustard);
    }

    .qty-display-small {
      width: 35px;
      text-align: center;
      font-weight: 600;
    }

    .remove-item {
      color: var(--red);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: color var(--transition);
    }

    .remove-item:hover {
      color: var(--oxblood);
    }

    /* EMPTY STATE */
    .cart-empty {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--text-light);
    }

    .cart-empty-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .cart-empty p {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    .btn-continue {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: var(--mustard);
      color: var(--ink);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 600;
      text-decoration: none;
      transition: all var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.85rem;
    }

    .btn-continue:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(230, 169, 52, 0.3);
    }

    /* SUMMARY SIDEBAR */
    .cart-summary {
      background: var(--white);
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(23, 20, 15, 0.08);
      height: fit-content;
      position: sticky;
      top: 2rem;
    }

    .summary-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 1.5rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.95rem;
      color: var(--text-mid);
    }

    .summary-row.total {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--ink);
      border-top: 2px solid var(--border);
      padding-top: 1rem;
      margin-top: 1rem;
    }

    .summary-row.total .value {
      color: var(--mustard);
      font-size: 1.4rem;
    }

    .summary-row .label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .summary-row .value {
      font-weight: 600;
      color: var(--ink);
    }

    .promo-section {
      margin: 1.5rem 0;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .promo-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.8rem;
      display: block;
    }

    .promo-input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
    }

    .promo-input:focus {
      outline: none;
      border-color: var(--mustard);
      box-shadow: 0 0 0 3px rgba(230, 169, 52, 0.1);
    }

    .btn-apply-promo {
      width: 100%;
      padding: 0.7rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.85rem;
      transition: all var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .btn-apply-promo:hover {
      background: var(--cream);
      border-color: var(--mustard);
      color: var(--mustard);
    }

    /* CHECKOUT BUTTON */
    .btn-checkout {
      width: 100%;
      padding: 1.2rem;
      background: var(--mustard);
      color: var(--ink);
      border: 2px solid var(--mustard);
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 700;
      margin-top: 1.5rem;
      transition: all var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .btn-checkout:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(230, 169, 52, 0.3);
    }

    .btn-checkout:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .checkout-note {
      font-size: 0.8rem;
      color: var(--text-light);
      text-align: center;
      margin-top: 1rem;
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .cart-container {
        grid-template-columns: 1fr;
      }

      .cart-summary {
        position: static;
      }
    }

    @media (max-width: 768px) {
      .cart-page {
        padding: 1rem;
      }

      .cart-title {
        font-size: 1.5rem;
      }

      .cart-item {
        grid-template-columns: 100px 1fr;
        gap: 1rem;
      }

      .cart-item-image {
        width: 100px;
        height: 100px;
        font-size: 2rem;
      }

      .cart-item-actions {
        align-items: flex-start;
      }
    }

    @media (max-width: 480px) {
      .cart-header {
        padding: 1rem;
      }

      .cart-header-content {
        flex-direction: column;
        gap: 1rem;
      }

      .cart-title {
        font-size: 1.2rem;
      }

      .cart-item {
        grid-template-columns: 80px 1fr;
      }

      .cart-item-image {
        width: 80px;
        height: 80px;
      }

      .cart-summary {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="cart-page">
    
    <!-- HEADER -->
    <div class="cart-header">
      <div class="cart-header-content">
        <a class="cart-back" onclick="goBack()">← Back</a>
        <h1 class="cart-title">Shopping Cart</h1>
        <div class="cart-placeholder"></div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="cart-container">
      
      <!-- CART ITEMS -->
      <div class="cart-items" id="cartItems">
        <div class="cart-items-header">
          <h2 id="itemsCount">Loading...</h2>
        </div>
      </div>

      <!-- SUMMARY SIDEBAR -->
      <div class="cart-summary">
        <h3 class="summary-title">Order Summary</h3>

        <div class="summary-row">
          <span class="label">Subtotal</span>
          <span class="value" id="subtotal">₦0</span>
        </div>

        <div class="summary-row">
          <span class="label">Shipping</span>
          <span class="value" id="shipping">Free</span>
        </div>

        <div class="summary-row">
          <span class="label">Tax</span>
          <span class="value" id="tax">₦0</span>
        </div>

        <div class="summary-row total">
          <span class="label">Total</span>
          <span class="value" id="total">₦0</span>
        </div>

        <div class="promo-section">
          <label class="promo-label">Promo Code</label>
          <input type="text" class="promo-input" id="promoCode" placeholder="Enter code">
          <button class="btn-apply-promo" onclick="applyPromo()">Apply Promo</button>
        </div>

        <button class="btn-checkout" id="checkoutBtn" onclick="goCheckout()">Proceed to Checkout</button>
        <p class="checkout-note">Secure checkout with Paystack</p>
      </div>

    </div>

  </div>

  <!-- INCLUDE UMA CLIENT -->
  <script src="universe-merch-backend/public/uma-client.js"></script>
  <script>
    UMA.init({ apiUrl: 'http://localhost:4000/api' });

    const cartItemsContainer = document.getElementById('cartItems');
    const itemsCount = document.getElementById('itemsCount');
    const checkoutBtn = document.getElementById('checkoutBtn');

    let cartData = [];

    // Load cart on page load
    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('UMA_CART') || '{}');
      cartData = Object.entries(cart).map(([key, item]) => ({
        key,
        ...item
      }));

      if (cartData.length === 0) {
        renderEmptyCart();
      } else {
        renderCart();
        updateSummary();
      }
    }

    // Render empty cart
    function renderEmptyCart() {
      cartItemsContainer.innerHTML = `
        <div class="cart-empty">
          <div class="cart-empty-icon">🛒</div>
          <p>Your cart is empty</p>
          <button class="btn-continue" onclick="continueShopping()">Continue Shopping</button>
        </div>
      `;
      checkoutBtn.disabled = true;
      itemsCount.textContent = '0 items in your cart';
    }

    // Render cart items
    function renderCart() {
      itemsCount.textContent = `${cartData.length} item${cartData.length !== 1 ? 's' : ''} in your cart`;

      let html = '<div class="cart-items-header"><h2>' + itemsCount.textContent + '</h2></div>';

      html += cartData.map((item, index) => `
        <div class="cart-item">
          <div class="cart-item-image">📦</div>
          <div class="cart-item-details">
            <h3 class="cart-item-name">${item.name}</h3>
            <div class="cart-item-meta">
              <span>Size: <strong>${item.size || 'One Size'}</strong></span>
              <span>Color: <strong>${item.color || 'N/A'}</strong></span>
            </div>
            <div class="cart-item-price">₦${(item.price * item.quantity).toLocaleString()}</div>
          </div>
          <div class="cart-item-actions">
            <div class="quantity-adjuster">
              <button class="qty-btn-small" onclick="decreaseQty(${index})">−</button>
              <div class="qty-display-small">${item.quantity}</div>
              <button class="qty-btn-small" onclick="increaseQty(${index})">+</button>
            </div>
            <a class="remove-item" onclick="removeItem(${index})">Remove</a>
          </div>
        </div>
      `).join('');

      cartItemsContainer.innerHTML = html;
      checkoutBtn.disabled = false;
    }

    // Update quantity
    function increaseQty(index) {
      if (cartData[index]) {
        cartData[index].quantity++;
        saveCart();
      }
    }

    function decreaseQty(index) {
      if (cartData[index] && cartData[index].quantity > 1) {
        cartData[index].quantity--;
        saveCart();
      }
    }

    // Remove item
    function removeItem(index) {
      if (confirm('Remove this item from your cart?')) {
        cartData.splice(index, 1);
        saveCart();
      }
    }

    // Save cart to localStorage
    function saveCart() {
      const cart = {};
      cartData.forEach(item => {
        const { key, ...data } = item;
        cart[key] = data;
      });
      localStorage.setItem('UMA_CART', JSON.stringify(cart));
      loadCart();
    }

    // Update summary
    function updateSummary() {
      const subtotal = cartData.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const tax = subtotal * 0.075; // 7.5% tax
      const shipping = subtotal > 10000 ? 0 : 2500;
      const total = subtotal + tax + shipping;

      document.getElementById('subtotal').textContent = `₦${subtotal.toLocaleString()}`;
      document.getElementById('tax').textContent = `₦${tax.toLocaleString()}`;
      document.getElementById('shipping').textContent = shipping === 0 ? 'Free' : `₦${shipping.toLocaleString()}`;
      document.getElementById('total').textContent = `₦${total.toLocaleString()}`;
    }

    // Apply promo
    function applyPromo() {
      const promoCode = document.getElementById('promoCode').value.trim();
      if (promoCode) {
        alert(`Promo code "${promoCode}" applied!`);
        // Implement promo logic here
      }
    }

    // Navigation
    function goBack() {
      window.history.back();
    }

    function continueShopping() {
      window.location.href = 'schools-browse.html';
    }

    function goCheckout() {
      if (cartData.length === 0) {
        alert('Your cart is empty');
        return;
      }
      window.location.href = 'checkout.html';
    }

    // Initial load
    loadCart();
  </script>

</body>
</html>
