<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — Universe Merch Africa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,600&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="universe-merch.css" />
  <style>
    /* ORDER CONFIRMATION PAGE STYLES */
    .confirmation-page {
      background: var(--cream);
      min-height: 100vh;
      padding: 2rem;
    }

    .confirmation-container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* SUCCESS HEADER */
    .confirmation-header {
      background: var(--white);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      margin-bottom: 2rem;
      box-shadow: 0 4px 16px rgba(23, 20, 15, 0.08);
      position: relative;
      overflow: hidden;
    }

    .confirmation-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(230, 169, 52, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .confirmation-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #1a5727;
      color: var(--white);
      display: grid;
      place-items: center;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
      border: 3px solid #2d7d3a;
    }

    .confirmation-title {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .confirmation-subtitle {
      font-size: 1.1rem;
      color: var(--text-mid);
      margin-bottom: 1rem;
    }

    .confirmation-order-number {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--mustard);
      background: rgba(230, 169, 52, 0.1);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 1rem;
    }

    .confirmation-message {
      font-size: 0.95rem;
      color: var(--text-mid);
      line-height: 1.6;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ORDER DETAILS */
    .order-details {
      background: var(--white);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 16px rgba(23, 20, 15, 0.08);
    }

    .order-section {
      margin-bottom: 2rem;
    }

    .order-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-icon {
      font-size: 1.2rem;
    }

    /* ORDER ITEMS */
    .order-items {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .order-item {
      display: grid;
      grid-template-columns: 80px 1fr 100px;
      gap: 1rem;
      padding: 1rem;
      background: var(--cream);
      border-radius: 8px;
      align-items: center;
    }

    .order-item-image {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--cream) 0%, rgba(91, 26, 26, 0.05) 100%);
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 2rem;
    }

    .order-item-details {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .order-item-name {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
    }

    .order-item-meta {
      font-size: 0.85rem;
      color: var(--text-mid);
    }

    .order-item-price {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--mustard);
      text-align: right;
    }

    /* ORDER SUMMARY */
    .order-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .summary-column {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      font-size: 0.9rem;
    }

    .summary-row.total {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
      border-top: 2px solid var(--border);
      padding-top: 1rem;
      margin-top: 0.5rem;
    }

    .summary-row.total .value {
      color: var(--mustard);
      font-size: 1.3rem;
    }

    .summary-label {
      color: var(--text-mid);
    }

    .summary-value {
      font-weight: 600;
      color: var(--ink);
    }

    /* DELIVERY INFO */
    .delivery-info {
      background: var(--cream);
      padding: 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .delivery-address {
      margin-bottom: 1rem;
    }

    .delivery-method {
      color: var(--text-mid);
    }

    /* PAYMENT INFO */
    .payment-info {
      background: var(--cream);
      padding: 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .payment-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .payment-status-icon {
      font-size: 1rem;
    }

    .payment-status.paid {
      color: #1a5727;
    }

    .payment-status.pending {
      color: var(--mustard);
    }

    /* NEXT STEPS */
    .next-steps {
      background: var(--white);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 16px rgba(23, 20, 15, 0.08);
    }

    .next-steps-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 1rem;
    }

    .steps-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .step-number {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--mustard);
      color: var(--ink);
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .step-content {
      flex: 1;
    }

    .step-title {
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    .step-description {
      font-size: 0.9rem;
      color: var(--text-mid);
      line-height: 1.4;
    }

    /* ACTION BUTTONS */
    .confirmation-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary,
    .btn-secondary {
      padding: 1rem 2rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .btn-primary {
      background: var(--mustard);
      color: var(--ink);
      border: 2px solid var(--mustard);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(230, 169, 52, 0.3);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-mid);
      border: 2px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--cream);
      border-color: var(--mustard);
      color: var(--mustard);
    }

    /* LOADING STATE */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-light);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(91, 26, 26, 0.2);
      border-top-color: var(--oxblood);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .confirmation-page {
        padding: 1rem;
      }

      .confirmation-title {
        font-size: 2rem;
      }

      .order-item {
        grid-template-columns: 60px 1fr;
        gap: 0.8rem;
      }

      .order-item-image {
        width: 60px;
        height: 60px;
        font-size: 1.5rem;
      }

      .order-summary {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .confirmation-actions {
        flex-direction: column;
        align-items: center;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
        max-width: 300px;
      }
    }

    @media (max-width: 480px) {
      .confirmation-header {
        padding: 2rem 1.5rem;
      }

      .confirmation-title {
        font-size: 1.8rem;
      }

      .order-details {
        padding: 1.5rem;
      }

      .next-steps {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="confirmation-page">
    <div class="confirmation-container" id="confirmationContainer">
      
      <!-- LOADING STATE -->
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Loading order confirmation...</p>
      </div>

    </div>
  </div>

  <!-- INCLUDE UMA CLIENT -->
  <script src="universe-merch-backend/public/uma-client.js"></script>
  <script>
    UMA.init({ apiUrl: 'http://localhost:4000/api' });

    const urlParams     = new URLSearchParams(window.location.search);
    // checkout.html now redirects with  ?order=UMA-2026-00001
    const orderNumber   = urlParams.get('order') || urlParams.get('order_number');
    const paymentPending = urlParams.get('payment_pending') === 'true';

    const confirmationContainer = document.getElementById('confirmationContainer');

    // Load order confirmation
    async function loadConfirmation() {
      if (!orderNumber) {
        confirmationContainer.innerHTML = `
          <div class="confirmation-header">
            <div class="confirmation-icon">⚠️</div>
            <h1 class="confirmation-title">Order Not Found</h1>
            <p class="confirmation-message">We couldn't find your order. Please contact support if you believe this is an error.</p>
            <div class="confirmation-actions">
              <a href="index.html" class="btn-primary">Go Home</a>
            </div>
          </div>
        `;
        return;
      }

      try {
        // GET /api/orders/by-number/:orderNumber  → { order, items }
        const data = await UMA.orders.track(orderNumber);

        // Normalise for renderConfirmation
        const orderData = {
          ...data.order,
          items: data.items,
          tax_amount: data.order.vat,
        };

        renderConfirmation(orderData);

      } catch (error) {
        console.error('Error loading order:', error);
        confirmationContainer.innerHTML = `
          <div class="confirmation-header">
            <div class="confirmation-icon">⚠️</div>
            <h1 class="confirmation-title">Error Loading Order</h1>
            <p class="confirmation-message">There was an error loading your order details.<br>
              Order number: <strong>${orderNumber}</strong> — please save this for reference.</p>
            <div class="confirmation-actions">
              <a href="index.html" class="btn-primary">Go Home</a>
              <button onclick="loadConfirmation()" class="btn-secondary">Try Again</button>
            </div>
          </div>
        `;
      }
    }

    // Render confirmation page
    function renderConfirmation(order) {
      const subtotal      = Number(order.subtotal)      || 0;
      const shippingCost  = Number(order.shipping_cost) || 0;
      const vatAmount     = Number(order.vat)           || Number(order.tax_amount) || 0;
      const totalAmount   = Number(order.total_amount)  || 0;
      const paymentStatus = order.payment_status === 'paid' ? 'paid' : 'pending';

      confirmationContainer.innerHTML = `
        
        <!-- SUCCESS HEADER -->
        <div class="confirmation-header">
          <div class="confirmation-icon">✅</div>
          <h1 class="confirmation-title">${paymentPending ? 'Order Placed!' : 'Order Confirmed!'}</h1>
          <p class="confirmation-subtitle">Thank you for shopping with Universe Merch Africa</p>
          <div class="confirmation-order-number">${order.order_number}</div>
          <p class="confirmation-message">
            ${paymentPending 
              ? 'Your order has been placed successfully. Please complete the bank transfer to confirm your payment.'
              : 'Your order has been confirmed and payment received. We\'ll send you shipping updates via email.'
            }
          </p>
        </div>

        <!-- ORDER DETAILS -->
        <div class="order-details">
          
          <!-- ORDER ITEMS -->
          <div class="order-section">
            <h3 class="section-title">
              <span class="section-icon">📦</span>
              Order Items
            </h3>
            <div class="order-items">
              ${order.items.map(item => `
                <div class="order-item">
                  <div class="order-item-image">📦</div>
                  <div class="order-item-details">
                    <div class="order-item-name">${item.name}</div>
                    <div class="order-item-meta">
                      Size: ${item.size} • Color: ${item.color} • Qty: ${item.quantity}
                    </div>
                  </div>
                  <div class="order-item-price">₦${(item.price * item.quantity).toLocaleString()}</div>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- ORDER SUMMARY -->
          <div class="order-section">
            <h3 class="section-title">
              <span class="section-icon">💰</span>
              Order Summary
            </h3>
            <div class="order-summary">
              <div class="summary-column">
                <div class="summary-row">
                  <span class="summary-label">Subtotal</span>
                  <span class="summary-value">₦${Math.round(subtotal).toLocaleString()}</span>
                </div>
                <div class="summary-row">
                  <span class="summary-label">Shipping</span>
                  <span class="summary-value">${shippingCost === 0 ? 'Free' : '₦' + shippingCost.toLocaleString()}</span>
                </div>
                <div class="summary-row">
                  <span class="summary-label">VAT (7.5%)</span>
                  <span class="summary-value">₦${Math.round(vatAmount).toLocaleString()}</span>
                </div>
                <div class="summary-row total">
                  <span class="summary-label">Total</span>
                  <span class="summary-value">₦${Math.round(totalAmount).toLocaleString()}</span>
                </div>
              </div>

              <div class="summary-column">
                <div class="delivery-info">
                  <div class="delivery-address">
                    <strong>Customer:</strong><br>
                    ${order.first_name} ${order.last_name}<br>
                    ${order.email}<br>
                    ${order.phone}
                    ${order.delivery_address ? `<br><br><strong>Deliver to:</strong><br>${order.delivery_address}${order.delivery_city ? ', ' + order.delivery_city : ''}${order.delivery_state ? ', ' + order.delivery_state : ''}` : ''}
                  </div>
                  <div class="delivery-method" style="margin-top:0.8rem;">
                    <strong>Delivery:</strong>
                    ${{ campus_pickup: 'Campus Pickup', doorstep: 'Doorstep Delivery', express: 'Express Delivery' }[order.delivery_method] || order.delivery_method}
                  </div>
                </div>

                <div class="payment-info" style="margin-top:1rem;">
                  <div class="payment-status ${paymentStatus}">
                    <span class="payment-status-icon">${paymentStatus === 'paid' ? '✅' : '⏳'}</span>
                    <span>Payment ${paymentStatus === 'paid' ? 'Received' : 'Pending'}</span>
                  </div>
                  <div style="margin-top:0.4rem;"><strong>Method:</strong>
                    ${{ card: 'Credit/Debit Card', transfer: 'Bank Transfer', ussd: 'USSD' }[order.payment_method] || order.payment_method}
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>

        <!-- NEXT STEPS -->
        <div class="next-steps">
          <h3 class="next-steps-title">What's Next?</h3>
          <div class="steps-list">
            ${paymentPending ? `
              <div class="step">
                <div class="step-number">1</div>
                <div class="step-content">
                  <div class="step-title">Complete Bank Transfer</div>
                  <div class="step-description">Transfer ₦${Math.round(totalAmount).toLocaleString()} to the account details provided. Include your order number <strong>${order.order_number}</strong> as reference.</div>
                </div>
              </div>
              <div class="step">
                <div class="step-number">2</div>
                <div class="step-content">
                  <div class="step-title">Payment Confirmation</div>
                  <div class="step-description">We'll confirm your payment within 1-2 business hours and send you an email confirmation.</div>
                </div>
              </div>
            ` : `
              <div class="step">
                <div class="step-number">1</div>
                <div class="step-content">
                  <div class="step-title">Order Processing</div>
                  <div class="step-description">We'll prepare your items and send you a shipping confirmation email within 24 hours.</div>
                </div>
              </div>
            `}
            <div class="step">
              <div class="step-number">${paymentPending ? '3' : '2'}</div>
              <div class="step-content">
                <div class="step-title">Shipping Updates</div>
                <div class="step-description">Track your package and receive delivery updates via email and SMS.</div>
              </div>
            </div>
            <div class="step">
              <div class="step-number">${paymentPending ? '4' : '3'}</div>
              <div class="step-content">
                <div class="step-title">Delivery</div>
                <div class="step-description">Your order will be delivered to the address provided within 3-5 business days.</div>
              </div>
            </div>
          </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="confirmation-actions">
          <a href="schools-browse.html" class="btn-primary">Continue Shopping</a>
          <a href="index.html" class="btn-secondary">Go Home</a>
        </div>

      `;
    }

    // Initialize
    loadConfirmation();
  </script>

</body>
</html>
